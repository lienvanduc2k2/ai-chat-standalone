name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Configure GitHub Pages
        # Registers this workflow as a Pages deployment workflow before uploading ./out.
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static export
        # For https://username.github.io/repository-name/, assets must be prefixed with /repository-name.
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          NEXT_PUBLIC_INVOICE_HUB_URL: ${{ vars.NEXT_PUBLIC_INVOICE_HUB_URL }}
          NEXT_PUBLIC_INVOICE_HUB_PROVIDER_CODE: ${{ vars.NEXT_PUBLIC_INVOICE_HUB_PROVIDER_CODE }}
          NEXT_PUBLIC_INVOICE_HUB_BANK_CODE: ${{ vars.NEXT_PUBLIC_INVOICE_HUB_BANK_CODE }}
        run: yarn build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
